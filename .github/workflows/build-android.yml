name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android_app/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          openjdk-17-jdk \
          autoconf \
          automake \
          libtool \
          pkg-config \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libffi-dev \
          libssl-dev \
          libltdl-dev
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install cython buildozer
    
    - name: Create Android SDK directory
      run: |
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/build-tools
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/platforms
    
    - name: Copy Android SDK
      run: |
        cp -r /usr/local/lib/android/sdk/build-tools/* /home/runner/.buildozer/android/platform/android-sdk/build-tools/ 2>/dev/null || true
        cp -r /usr/local/lib/android/sdk/platforms/* /home/runner/.buildozer/android/platform/android-sdk/platforms/ 2>/dev/null || true
        cp -r /usr/local/lib/android/sdk/platform-tools/* /home/runner/.buildozer/android/platform/android-sdk/platform-tools/ 2>/dev/null || true
    
    - name: Set permissions
      run: |
        chmod -R 755 /home/runner/.buildozer/android/platform/android-sdk
    
    - name: Build with Buildozer
      working-directory: android_app
      env:
        ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
        ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
        JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
      run: |
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: android_app/bin/*.apk
        retention-days: 30
