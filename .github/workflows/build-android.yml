name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android_app/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Build with kivy-action
      uses: kivymd/KivyMD-Action-Build-Apk@master
      with:
        apk_path: android_app/bin
        build_type: debug
        app_root: android_app
        requirements: python3,kivy
        android_api: 27
        android_min_api: 21
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: android_app/bin/*.apk
        retention-days: 30
